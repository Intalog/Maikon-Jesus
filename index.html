<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<body>
    <header class="profile-header">
        <button class="share-button" id="openShareModal" title="Compartilhar">
            <i class="fas fa-share-alt"></i>
        </button>
        <div class="profile-pic-container">
            <img src="img/perfil.png" alt="Sua Foto" class="profile-pic">
        </div>
        <h1>Maikon Jesus</h1>
        <p>Gerente Nacional</p>

        <div class="logo-container">
            <img src="img/logo.png" alt="Logo da Empresa" class="company-logo">
        </div>
    </header>

    <main class="button-container">
        <a href="https://wa.me/5521964469022" target="_blank" class="button whatsapp-button">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a href="tel:+5521964469022" class="button primary-button">
            <i class="fas fa-phone"></i> Ligar
        </a>
        <a href="mailto:gerencianacionalop@intalog.com.br" class="button email-button">
            <i class="fas fa-envelope"></i> Email
        </a>
        <!-- <a href="https://www.linkedin.com/in/sabrina-oliveira-b8411213a/" target="_blank"
            class="button social-button linkedin">

        </a> -->
        <button class="button save-contact-button" id="saveContact">
            <i class="fas fa-address-book"></i> Salvar Contato
        </button>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeShareModal">&times;</span>
            <h2>Compartilhar Cartão</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://intalog.github.io/Maikon-Jesus/" alt="QR Code" class="share-qr-img">
            <p>Escaneie para acessar o cartão virtual</p>
            <div class="share-url-container" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <input type="text" value="https://intalog.github.io/Maikon-Jesus/" id="shareUrl" readonly style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; text-align: center; font-size: 0.85em;">
                <button class="copy-button" data-clipboard-target="#shareUrl">Copiar Link</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="socials-title">Siga nossas redes:</p>
        <div class="intalog-socials">
            <a href="https://intalog.com.br/" target="_blank" title="Página Oficial"><i class="fas fa-globe"></i></a>
            <a href="https://wa.me/5521964469022" target="_blank" title="WhatsApp Comercial"><i class="fab fa-whatsapp"></i></a>

            <a href="https://www.linkedin.com/company/intalog-logistica-e-transportes-ltda/posts/?feedView=all" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.8/clipboard.min.js"></script>
